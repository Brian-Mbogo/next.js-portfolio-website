<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dashboard thumbnail">
  <defs>
    <linearGradient id="bg-dash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050816"/>
      <stop offset="0.55" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="glass-dash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.10)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
    <linearGradient id="accent-a" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="accent-b" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#EC4899"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="675" rx="48" fill="url(#bg-dash)"/>
  <circle cx="210" cy="120" r="140" fill="rgba(99,102,241,0.18)" filter="url(#soft)"/>
  <circle cx="1010" cy="200" r="180" fill="rgba(14,165,233,0.14)" filter="url(#soft)"/>
  <circle cx="820" cy="560" r="220" fill="rgba(236,72,153,0.10)" filter="url(#soft)"/>

  <g filter="url(#shadow)">
    <rect x="70" y="64" width="1060" height="547" rx="40" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)"/>
  </g>

  <!-- Window chrome -->
  <rect x="94" y="88" width="1012" height="62" rx="22" fill="rgba(255,255,255,0.08)"/>
