<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Task tracker thumbnail">
  <defs>
    <linearGradient id="bg-task" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060815"/>
      <stop offset="1" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="accent-task" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#10B981"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="accent-task-2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <filter id="shadow-task" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow-task" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="675" rx="48" fill="url(#bg-task)"/>
  <circle cx="260" cy="520" r="230" fill="rgba(16,185,129,0.14)" filter="url(#glow-task)"/>
  <circle cx="980" cy="180" r="190" fill="rgba(99,102,241,0.12)" filter="url(#glow-task)"/>

  <g filter="url(#shadow-task)">
    <rect x="72" y="64" width="1056" height="547" rx="40" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)"/>
  </g>

  <!-- Header row -->
  <rect x="96" y="88" width="1008" height="70" rx="24" fill="rgba(255,255,255,0.08)"/>
  <rect x="126" y="112" width="240" height="22" rx="11" fill="rgba(255,255,255,0.18)"/>
  <rect x="822" y="112" width="120" height="22" rx="11" fill="rgba(255,255,255,0.10)"/>
  <rect x="954" y="112" width="150" height="22" rx="11" fill="rgba(16,185,129,0.18)" stroke="rgba(16,185,129,0.30)"/>

  <!-- Filters -->
  <rect x="96" y="174" width="360" height="46" rx="18" fill="rgba(255,255,255,0.08)"/>
  <rect x="112" y="188" width="112" height="18" rx="9" fill="rgba(255,255,255,0.14)"/>
  <rect x="232" y="188" width="96" height="18" rx="9" fill="rgba(255,255,255,0.10)"/>
  <rect x="334" y="188" width="104" height="18" rx="9" fill="rgba(255,255,255,0.08)"/>

  <!-- Task list (more realistic rows) -->
  <rect x="96" y="238" width="1008" height="86" rx="28" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.08)"/>
  <rect x="124" y="268" width="30" height="30" rx="9" fill="url(#accent-task)"/>
  <path d="M134 283l6 6 12-14" fill="none" stroke="rgba(0,0,0,0.55)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="172" y="266" width="420" height="14" rx="7" fill="rgba(255,255,255,0.18)"/>
  <rect x="172" y="290" width="520" height="12" rx="6" fill="rgba(255,255,255,0.10)"/>
  <rect x="820" y="266" width="110" height="20" rx="10" fill="rgba(99,102,241,0.16)" stroke="rgba(99,102,241,0.28)"/>
  <rect x="944" y="266" width="140" height="20" rx="10" fill="rgba(245,158,11,0.14)" stroke="rgba(245,158,11,0.25)"/>

  <rect x="96" y="338" width="1008" height="86" rx="28" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.08)"/>
  <rect x="124" y="368" width="30" height="30" rx="9" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.12)"/>
  <rect x="172" y="366" width="380" height="14" rx="7" fill="rgba(255,255,255,0.16)"/>
  <rect x="172" y="390" width="480" height="12" rx="6" fill="rgba(255,255,255,0.10)"/>
  <rect x="862" y="366" width="90" height="20" rx="10" fill="rgba(14,165,233,0.14)" stroke="rgba(14,165,233,0.25)"/>
  <rect x="964" y="366" width="120" height="20" rx="10" fill="rgba(236,72,153,0.13)" stroke="rgba(236,72,153,0.24)"/>

  <rect x="96" y="438" width="1008" height="86" rx="28" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.08)"/>
  <rect x="124" y="468" width="30" height="30" rx="9" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.12)"/>
  <rect x="172" y="466" width="340" height="14" rx="7" fill="rgba(255,255,255,0.16)"/>
  <rect x="172" y="490" width="430" height="12" rx="6" fill="rgba(255,255,255,0.10)"/>
  <rect x="860" y="466" width="116" height="20" rx="10" fill="rgba(16,185,129,0.14)" stroke="rgba(16,185,129,0.26)"/>

  <!-- Footer actions -->
  <rect x="96" y="542" width="220" height="46" rx="23" fill="url(#accent-task)"/>
  <rect x="332" y="542" width="184" height="46" rx="23" fill="rgba(255,255,255,0.10)"/>
  <rect x="536" y="542" width="210" height="46" rx="23" fill="url(#accent-task-2)"/>
</svg>
