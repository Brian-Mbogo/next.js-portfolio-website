<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Portfolio thumbnail">
  <defs>
    <linearGradient id="bg-port" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070A1A"/>
      <stop offset="1" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0EA5E9"/>
      <stop offset="0.45" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.10)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
    <filter id="shadow-port" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow-port" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="675" rx="48" fill="url(#bg-port)"/>
  <circle cx="260" cy="170" r="190" fill="rgba(14,165,233,0.16)" filter="url(#glow-port)"/>
  <circle cx="900" cy="120" r="170" fill="rgba(99,102,241,0.14)" filter="url(#glow-port)"/>
  <circle cx="930" cy="560" r="230" fill="rgba(236,72,153,0.10)" filter="url(#glow-port)"/>

  <g filter="url(#shadow-port)">
    <rect x="72" y="64" width="1056" height="547" rx="40" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)"/>
  </g>

  <!-- Top bar -->
  <rect x="96" y="88" width="1008" height="64" rx="22" fill="rgba(255,255,255,0.08)"/>
  <rect x="128" y="110" width="190" height="20" rx="10" fill="rgba(255,255,255,0.18)"/>
  <rect x="780" y="110" width="96" height="20" rx="10" fill="rgba(255,255,255,0.10)"/>
  <rect x="888" y="110" width="96" height="20" rx="10" fill="rgba(255,255,255,0.08)"/>
  <rect x="996" y="110" width="88" height="20" rx="10" fill="rgba(255,255,255,0.06)"/>

  <!-- Hero -->
  <rect x="96" y="168" width="1008" height="196" rx="34" fill="url(#card)" stroke="rgba(255,255,255,0.08)"/>
  <circle cx="164" cy="244" r="44" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.10)"/>
  <rect x="226" y="208" width="420" height="18" rx="9" fill="rgba(255,255,255,0.22)"/>
  <rect x="226" y="236" width="560" height="14" rx="7" fill="rgba(255,255,255,0.12)"/>
  <rect x="226" y="260" width="520" height="14" rx="7" fill="rgba(255,255,255,0.10)"/>
  <rect x="226" y="292" width="210" height="44" rx="22" fill="url(#rainbow)"/>
  <rect x="450" y="304" width="176" height="20" rx="10" fill="rgba(255,255,255,0.10)"/>

  <!-- Project cards grid -->
  <rect x="96" y="386" width="320" height="225" rx="30" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.08)"/>
  <rect x="120" y="410" width="272" height="120" rx="22" fill="rgba(255,255,255,0.06)"/>
  <rect x="120" y="542" width="180" height="12" rx="6" fill="rgba(255,255,255,0.16)"/>
  <rect x="120" y="562" width="240" height="10" rx="5" fill="rgba(255,255,255,0.09)"/>
  <rect x="120" y="580" width="92" height="18" rx="9" fill="rgba(14,165,233,0.18)" stroke="rgba(14,165,233,0.28)"/>

  <rect x="440" y="386" width="320" height="225" rx="30" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.08)"/>
  <rect x="464" y="410" width="272" height="120" rx="22" fill="rgba(255,255,255,0.06)"/>
  <rect x="464" y="542" width="210" height="12" rx="6" fill="rgba(255,255,255,0.16)"/>
  <rect x="464" y="562" width="248" height="10" rx="5" fill="rgba(255,255,255,0.09)"/>
  <rect x="464" y="580" width="104" height="18" rx="9" fill="rgba(99,102,241,0.18)" stroke="rgba(99,102,241,0.30)"/>

  <rect x="784" y="386" width="320" height="225" rx="30" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.08)"/>
  <rect x="808" y="410" width="272" height="120" rx="22" fill="rgba(255,255,255,0.06)"/>
  <rect x="808" y="542" width="190" height="12" rx="6" fill="rgba(255,255,255,0.16)"/>
  <rect x="808" y="562" width="232" height="10" rx="5" fill="rgba(255,255,255,0.09)"/>
  <rect x="808" y="580" width="96" height="18" rx="9" fill="rgba(236,72,153,0.16)" stroke="rgba(236,72,153,0.28)"/>
</svg>
